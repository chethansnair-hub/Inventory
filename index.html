<html>
    <head>
        <title>Inventory</title>
    </head>
    <body>
        
    
        <form id="Form" action="https://script.google.com/macros/s/AKfycbz9CsV7B_2tck-QiFsTHaBNk5gtm70YifMcha9kNEsER3IDyzFRoioNExoJMiN2UTepFA/exec" method="POST">
        <label for="Name">Name:</label>
        <input type="text" id="Name" required name="Name">
        
        <label for="Quantity">Current Quantity(Just Number):</label>
        <input type="number" id="Quantity" required name="Quantity">
        <div>
        <label>Time for Usage Rate</label>
         <input type="radio" id="day" name="Time" value="Daily">
            <label for="week">Daily</label>
        <input type="radio" id="week" name="Time" value="Weekly">
            <label for="week">Weekly</label>
        <input type="radio" id="month" name="Time" value="Monthly">
            <label for="month">Monthly</label>
        </div>


        <label for="Rate">Usage Rate(Based on Selected Option Above):<label>
        <input type="number" id="Rate" required name="Rate">
        <label for="Restock">Restock Rate</label>
        <input type="number" id="Restock" required name="Restock">
        <button type="submit">Submit</button>
