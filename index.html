<html>
    <head>
        <title>Inventory</title>
    </head>
    <body>
        
    
        <form id="Form">
        <label for="Name">Name:</label>
        <input type="text" id="Name" required name="Name">
        
        
        <label for="Quantity">Current Quantity(Just Number):</label>
        <input type="number" id="Quantity" required name="Quantity">
        <div>
        <label>Time for Usage Rate</label>
        <input type="radio" id="day" name="Time" value="Daily">
        <label for="day">Daily</label>
        <input type="radio" id="week" name="Time" value="Weekly">
        <label for="day">Weekly</label>
        <input type="radio" id="month" name="Time" value="Monthly">
        <label for="day">Monthly</label>
        <label for="Rate">Usage Rate(Based on Selected Option Above):<label>
        <input type="number" id="Rate" required name="Rate">
        <label for="Restock">Restock Rate</label>
        <input type="number" id="Restock" required>

        <button type="submit">Add to Table</button>
        <table id="dataTable">
            <tr>
                <th>Name</th>
                <th>Quantity</th>
                <th>Time</th>
                <th>Rate</th>
                <th>Restock</th>
                
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                
            </tr>
           
        </table>

    <script>
        const form = document.getElementById('Form');
        const tableBody = document.querySelector('#dataTable tbody');
        form.addEventListener('submit', function(event){
            event.preventDefault()
            const name = document.getElementById('Name').value;
            const quantity = document.getElementById('Quantity').value;
            const time = document.querySelector('input[name="Time"]:checked').value;
            const rate = document.getElementById('Rate').value;
            const restock = document.getElementById('Restock').value;
            const row = document.createElement('tr');
            const nameC = document.createElement('td');
            nameC.textContent = name;
            const quantityC = document.createElement('td');
            quantityC.textContent = quantity;
            const rateC = document.createElement('td');
            rateC.textContent = rate;
           
            const timeC = document.createElement('td');

            const restockC = document.createElement('td');
            restockC.textContent = restock;
            timeC.textContent = time;
            row.appendChild(nameC);
            row.appendChild(quantityC);
            row.appendChild(timeC);
            row.appendChild(rateC)
            row.appendChild(restockC);
            tableBody.appendChild(row);

            form.reset()

        });
            
    </script>
